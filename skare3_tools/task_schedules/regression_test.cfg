# The tri-weekly skare3 regression tests, run by task_schedule3.pl.
#
# Launched from kadi's crontab through the skare3-tasks harness, which
# provides the secrets (~/.ci-auth) and the PATH of its own environment.
# Operations runbook: skare3_deploy/DASHBOARD.md

subject           skare3 regression tests (HEAD)
timeout           18000             # Default tool timeout
heartbeat_timeout 1                 # Maximum age of heartbeat file (seconds)
iterations        1                 # Run once then shut down task_schedule
print_error       1                 # Print full log of errors
disable_alerts    0
loud              0                 # Run loudly or quietly (production mode)

data_dir     /export/kadi/ska_testr/data          # Data file directory
log_dir      /export/kadi/ska_testr/test_outputs  # Log file directory
master_log   regression_test.log                  # Composite master log (created in log_dir)

# Email addresses that receive an alert if there was a severe error in
# running jobs (i.e. couldn't start jobs or couldn't open log file).

alert       javier.gonzalez@cfa.harvard.edu

<task regression_test>
      cron       * * * * *
      check_cron * * * * *
      exec 1: run_testr --root /export/kadi/ska_testr --outputs-dir /export/kadi/ska_testr/test_outputs
      exec 1: skare3-publish-test-logs /export/kadi/ska_testr/test_outputs/logs/last /proj/sot/ska/www/ASPECT_ICXC/skare3/testr/logs
      exec 1: skare3-test-results --stream ska3-masters /export/kadi/ska_testr/test_outputs/logs/last
</task>
